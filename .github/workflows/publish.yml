name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-version-sync:
    name: Validate Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate versions match
        run: |
          # Extract version from tag (remove 'v' prefix)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"

          # Extract Android version from build.gradle.kts
          ANDROID_VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' android/build.gradle.kts | head -1)
          echo "Android version: $ANDROID_VERSION"

          # Extract iOS version from podspec
          IOS_VERSION=$(grep -oP "s\.version\s*=\s*'\K[^']+" ios/PolyfenceCore.podspec)
          echo "iOS version: $IOS_VERSION"

          # Validate all versions match
          if [ "$TAG_VERSION" != "$ANDROID_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Android version ($ANDROID_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$IOS_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match iOS version ($IOS_VERSION)"
            exit 1
          fi
          echo "✓ All versions match: $TAG_VERSION"

  ios-test-ci:
    name: iOS Swift Tests (Pre-Publish Gate)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode and list simulators
        run: |
          for xc in /Applications/Xcode_16.*.app /Applications/Xcode.app; do
            [ -d "$xc" ] && { sudo xcode-select -s "$xc"; break; }
          done
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Install iOS Simulator runtime if missing
        run: |
          if ! xcrun simctl list runtimes | grep -q "iOS.*Available"; then
            echo "No iOS Simulator runtime found, installing..."
            xcodebuild -downloadPlatform iOS
          fi

      - name: Build and test Swift package (iOS Simulator)
        run: bash scripts/ci-ios-swift-tests.sh PolyfenceCore

  publish-maven:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: [validate-version-sync, ios-test-ci]
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode GPG signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 --decode > /tmp/signing-key.asc
          echo "ORG_GRADLE_PROJECT_signingInMemoryKey<<GPGEOF" >> $GITHUB_ENV
          cat /tmp/signing-key.asc >> $GITHUB_ENV
          echo "GPGEOF" >> $GITHUB_ENV
          rm /tmp/signing-key.asc

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral

  publish-cocoapods:
    name: Publish to CocoaPods
    runs-on: macos-latest
    needs: [validate-version-sync, ios-test-ci]
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Lint podspec
        run: pod lib lint PolyfenceCore.podspec --allow-warnings --skip-import-validation

      - name: Push to CocoaPods trunk
        if: ${{ !contains(github.ref_name, 'rc') }}
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push PolyfenceCore.podspec

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-maven, publish-cocoapods]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'rc') }}
