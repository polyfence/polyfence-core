name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-maven:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode GPG key
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > /tmp/signing-key.asc

      - name: Import GPG key
        run: gpg --batch --import /tmp/signing-key.asc && rm /tmp/signing-key.asc

      - name: Build & Publish
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishReleasePublicationToOSSRHRepository

  publish-cocoapods:
    name: Publish to CocoaPods
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Lint podspec
        run: pod lib lint PolyfenceCore.podspec --allow-warnings

      - name: Push to CocoaPods trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push PolyfenceCore.podspec --allow-warnings

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-maven, publish-cocoapods]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
