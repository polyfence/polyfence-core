# Phase 3 declarative drift checks — polyfence-core
checks:
  - id: bootstrap-files-not-tracked
    description: CLAUDE.md, .cursorrules, tasks/, prompts/, .claude/ must never be tracked
    type: subprocess
    runs: bash scripts/consistency-bootstrap-not-tracked.sh
    fix: Remove tracked bootstrap/internal paths — git rm --cached them — keep local-only copies per CONTRIBUTING guidance.

  - id: podspec-gradle-version-match
    description: CocoaPods PolyfenceCore.podspec version matches android/build.gradle.kts library version
    type: subprocess
    runs: bash scripts/consistency-podspec-gradle-version.sh
    fix: Bump s.version and the Gradle library version together before tagging dual-platform releases.

  - id: readme-cites-brand-positioning
    description: README carries canonical positioning anchor (brand doc path or geofence-layer phrase)
    type: regex-presence
    files:
      - README.md
    pattern: "(BRAND_POSITIONING\\.md|geofence layer)"
    fix: Align README intro copy against the canonical brand pitch (geofence layer framing).

  - id: gradle-build-clean
    description: optional full Gradle build when POLYFENCE_RUN_GRADLE=1
    type: subprocess
    runs: bash scripts/consistency-gradle-build-optional.sh
    fix: Fix Gradle compilation failures surfaced when POLYFENCE_RUN_GRADLE=1 is set OR investigate deterministic failures locally via cd android && ./gradlew build.

  - id: privacy-md-zero-pii-headline
    description: PRIVACY.md keeps the zero-PII-about-end-users headline (template anchor)
    type: regex-presence
    files:
      - PRIVACY.md
    pattern: "(?i)Zero PII about your end users"
    fix: Restore the templates/PRIVACY_ROLE1.md zero-PII headline block; do not paraphrase the canonical line.

  - id: readme-canonical-define-once-phrase
    description: README repeats the define-once / three-surfaces pitch fragment from brand positioning
    type: regex-presence
    files:
      - README.md
    pattern: "(?i)define once"
    fix: Sync README lead sentence against commercial/BRAND_POSITIONING.md three-follow-up / one-sentence pitch snippets.
